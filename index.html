<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#15212c" />
    <title>Raid and Run</title>
  </head>
  <body>
    <main class="game-shell" aria-label="Raid and Run game">
      <canvas id="game" width="420" height="620" aria-label="Raid and Run playfield"></canvas>
      <button id="pause" class="pause-button" type="button" aria-label="Pause game" aria-pressed="false">
        Pause
      </button>
      <button id="restart" class="restart-button" type="button" aria-label="Restart game">
        Restart
      </button>
      <div class="dpad" role="group" aria-label="Movement controls">
        <button class="dpad-btn dpad-up" type="button" data-direction="up" aria-label="Move up">Up</button>
        <button class="dpad-btn dpad-left" type="button" data-direction="left" aria-label="Move left">Left</button>
        <span class="dpad-center" aria-hidden="true"></span>
        <button class="dpad-btn dpad-right" type="button" data-direction="right" aria-label="Move right">Right</button>
        <button class="dpad-btn dpad-down" type="button" data-direction="down" aria-label="Move down">Down</button>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
